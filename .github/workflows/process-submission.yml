name: Process Form Submission

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'form-submission')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract submission JSON and save to repo
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;

            // Extract JSON between the SUBMISSION_JSON_START / SUBMISSION_JSON_END markers
            const m = issue.body.match(/<!-- SUBMISSION_JSON_START -->([\s\S]*?)<!-- SUBMISSION_JSON_END -->/);
            if (!m) {
              throw new Error('No submission JSON found in issue body');
            }
            const jsonBlock = m[1].replace(/```json|```/g, '').trim();

            let data;
            try {
              data = JSON.parse(jsonBlock);
            } catch (e) {
              throw new Error('Failed to parse submission JSON: ' + e.message);
            }

            const folder = `submissions/${data.submission_id}`;
            fs.mkdirSync(folder + '/files', { recursive: true });

            // Safe accessors
            const b = data.business || {};
            const s = data.social || {};
            const t = data.trust_badges || {};
            const p = data.pricing || {};
            const projects = data.projects || [];
            const locations = data.locations || [];
            const reviews = data.reviews || [];
            const faq = data.faq || { has_faq: '', items: [] };
            const tl = data.about_timeline || {};
            const ar = data.about_review || {};
            const team = data.team_members || [];

            // 1. Write data.json next to uploaded files
            fs.writeFileSync(`${folder}/data.json`, JSON.stringify(data, null, 2) + '\n');

            // 2. Write a human-readable summary
            let summary = `# Submission ${data.submission_id}\n\n`;
            summary += `Submitted at: ${data.submitted_at}\n`;
            summary += `Issue: #${issue.number} - ${issue.html_url}\n\n`;
            summary += `## Business\n`;
            summary += `- Logo: ${b.logo || ''}${b.logo_option ? ` (${b.logo_option})` : ''}\n`;
            summary += `- Logo file: ${b.logo_file || 'none'}\n`;
            summary += `- Phone: ${b.phone || ''}\n`;
            summary += `- Email: ${b.email || ''}\n`;
            summary += `- Address: ${b.address_line1 || ''} ${b.address_line2 || ''}\n\n`;
            summary += `## Social\n`;
            for (const [k, v] of Object.entries(s)) summary += `- ${k}: ${v || ''}\n`;
            summary += `\n## Trust Badges\n`;
            for (const [k, v] of Object.entries(t)) summary += `- ${k}: ${v || ''}\n`;
            summary += `\n## Pricing\n`;
            for (const [k, v] of Object.entries(p)) summary += `- ${k}: ${v || ''}\n`;
            summary += `\n## Projects (${projects.length})\n`;
            projects.forEach((p, i) => {
              summary += `\n### Project ${i + 1}\n`;
              for (const [k, v] of Object.entries(p)) summary += `- ${k}: ${v || ''}\n`;
            });
            summary += `\n## Locations (${locations.length})\n`;
            locations.forEach(l => summary += `- ${l}\n`);
            summary += `\n## Reviews (${reviews.length})\n`;
            reviews.forEach((r, i) => {
              summary += `\n### Review ${i + 1}\n`;
              for (const [k, v] of Object.entries(r)) summary += `- ${k}: ${v || ''}\n`;
            });
            summary += `\n## FAQ\n- Has FAQ: ${faq.has_faq || ''}\n- Items: ${(faq.items || []).length}\n`;
            (faq.items || []).forEach((f, i) => {
              summary += `\n### FAQ ${i + 1}\n- Q: ${f.question}\n- A: ${f.answer}\n`;
            });
            summary += `\n## About Timeline\n- Change: ${tl.change || ''}\n- Description: ${tl.description || ''}\n`;
            summary += `\n## About Review\n- Change: ${ar.change || ''}\n- Description: ${ar.description || ''}\n`;
            summary += `\n## Team Members (${team.length})\n`;
            team.forEach((t, i) => {
              summary += `\n### Team ${i + 1}\n`;
              for (const [k, v] of Object.entries(t)) summary += `- ${k}: ${v || ''}\n`;
            });
            summary += `\n## Additional\n${data.additional || ''}\n`;
            fs.writeFileSync(`${folder}/SUMMARY.md`, summary);

            // Commit the generated files
            const { execFileSync } = require('child_process');
            const run = (cmd, args) => execFileSync(cmd, args, { stdio: 'inherit' });

            // Configure git
            run('git', ['config', 'user.name', 'github-actions[bot]']);
            run('git', ['config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com']);
            run('git', ['add', `${folder}/data.json`, `${folder}/SUMMARY.md`]);
            run('git', ['commit', '-m', `Process submission ${data.submission_id} (issue #${issue.number})`]);
            run('git', ['push']);

            // Comment on the issue with the saved path
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `✅ Submission processed and saved to [\`${folder}/\`](https://github.com/${context.repo.owner}/${context.repo.repo}/tree/main/${folder}).\n\nFiles: [data.json](${folder}/data.json) • [SUMMARY.md](${folder}/SUMMARY.md)`
            });

            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed'
            });